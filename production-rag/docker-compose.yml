services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=true
      - EMBEDDING_BACKEND=fastembed
      - CLIENT_URL=http://localhost:8080,http://localhost:5173
      - AUTO_SEED=true
    volumes:
      - rag_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  rag_data:
